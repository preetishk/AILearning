syntax = "proto3";

message Order {
  string order_id = 1;
  
  Customer customer = 2;
  
  repeated OrderItem items = 3;
  
  double total_amount = 4;
  string status = 5;
  string created_at = 6;
}

message Customer {
  int32 customer_id = 1;
  string name = 2;
  string email = 3;
}

message OrderItem {
  int32 product_id = 1;
  string name = 2;
  int32 quantity = 3;
  double price = 4;
}